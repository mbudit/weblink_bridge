version: '3.8'

services:
  bridge:
    build: .
    container_name: weblink-be
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=192.168.101.211
      - DB_PORT=5432
      - DB_NAME=weblink
      - DB_USER=pguser
      - DB_PASS=pgpass
      - MAX_CONN=5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
